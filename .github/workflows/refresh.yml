name: Refresh Market Data & Deploy

on:
  schedule:
    - cron: '0 13 * * 1-5'   # ~9:00 AM EDT / 8:00 AM EST (30min before open)
    - cron: '15 21 * * 1-5'  # ~5:15 PM EDT / 4:15 PM EST (after close)
  workflow_dispatch: # manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch market data
        run: npx tsx script/refresh.ts

      - name: Build static site
        run: npx tsx script/build-static.ts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
